name: CI

# Cancel in-progress runs on the same branch to avoid queueing up duplicate work.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Typecheck ────────────────────────────────────────────────────────────────
  typecheck:
    name: "Typecheck (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [server, worker, client]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Worker shares the server's Prisma schema — generate before tsc runs.
      - name: Generate Prisma client
        if: matrix.service != 'client'
        run: npx prisma generate ${{ matrix.service == 'worker' && '--schema ../server/prisma/schema.prisma' || '' }}

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: "Test (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [server, worker, client]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Worker shares the server's Prisma schema — generate so imports resolve.
      - name: Generate Prisma client
        if: matrix.service != 'client'
        run: npx prisma generate ${{ matrix.service == 'worker' && '--schema ../server/prisma/schema.prisma' || '' }}

      - name: Run tests
        run: npx vitest run --reporter=verbose

  # ── Docker build validation ──────────────────────────────────────────────────
  # Catches Dockerfile regressions before they reach production.
  docker-build:
    name: "Docker build (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: server
            context: ./server
            dockerfile: server/Dockerfile
          - service: worker
            context: .
            dockerfile: worker/Dockerfile
          - service: client
            context: ./client
            dockerfile: client/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          # Cache layers across runs using GitHub's cache backend.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # CLERK DISABLED — no Clerk build args needed. Uncomment below when re-enabling:
          # build-args: |
          #   VITE_CLERK_PUBLISHABLE_KEY=pk_test_placeholder

  # ── Gate ─────────────────────────────────────────────────────────────────────
  # A single job that depends on every check. Merge-branch protection rules only
  # need to watch this one job instead of tracking each matrix leg separately.
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [typecheck, test, docker-build]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
