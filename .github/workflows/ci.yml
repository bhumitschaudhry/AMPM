name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server, worker, client]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
        name: TypeScript check

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server, worker, client]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=verbose
        name: Run tests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    strategy:
      matrix:
        service: [server, worker, client]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
      - name: Generate Prisma client (server/worker)
        if: matrix.service != 'client'
        run: npx prisma generate
      - run: npm run build
